name: Update MFM Episodes

on:
  schedule:
    # Every Monday at 13:00 UTC. MFM typically releases Mon/Wed/Fri.
    - cron: "0 13 * * 1"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Run incremental updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_episodes.py

      - name: Commit and push if changed
        run: |
          git config user.name "mfm-explorer-bot"
          git config user.email "actions@users.noreply.github.com"
          git add episodes.json
          git diff --staged --quiet || git commit -m "Auto-update: new episodes $(date -u +%Y-%m-%d)"
          git push
